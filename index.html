<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OVA — Designed for Calm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'ova-beige': '#E8DCC8',
                        'ova-amber': '#E8A33B',
                        'ova-black': '#1C1A16',
                    },
                    fontFamily: {
                        display: ['system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: linear-gradient(180deg, #FFFFFF 0%, #F5F0E8 100%);
            min-height: 100vh;
        }
        .lamp-egg {
            animation: breathe 3s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }
    </style>
</head>
<body class="font-display">

    <!-- Hero Section -->
    <section class="min-h-screen flex flex-col items-center justify-center px-6">
        <div class="text-center max-w-3xl">
            <!-- Logo -->
            <div class="mb-8">
                <svg width="80" height="100" viewBox="0 0 32 40" class="mx-auto mb-4">
                    <path d="M16 40C24.8366 40 32 31.0457 32 20C32 8.9543 24.8366 0 16 0C7.16344 0 0 8.9543 0 20C0 31.0457 7.16344 40 16 40Z" fill="#1C1A16"/>
                    <circle cx="16" cy="12" r="4" fill="#E8A33B"/>
                </svg>
                <h1 class="text-4xl md:text-6xl font-bold text-ova-black mb-2">OVA</h1>
                <p class="text-gray-500 tracking-[0.3em] text-sm uppercase">Designed for Calm</p>
            </div>

            <!-- Tagline -->
            <p class="text-xl md:text-2xl text-gray-600 mb-12 leading-relaxed">
                Light That Feels Like Home
            </p>

            <!-- Lamp Visual -->
            <div class="relative mb-12">
                <div class="w-48 h-64 bg-ova-black rounded-t-full rounded-b-2xl mx-auto lamp-egg relative shadow-2xl">
                    <div class="absolute top-12 left-1/2 -translate-x-1/2 w-6 h-6 bg-ova-amber rounded-full shadow-lg shadow-ova-amber/50"></div>
                </div>
                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 bg-ova-amber/20 rounded-full blur-3xl"></div>
            </div>

            <!-- CTA Buttons -->
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <button class="px-8 py-4 bg-ova-black text-white font-medium hover:bg-ova-amber transition-colors">
                    Explore Collection
                </button>
                <button class="px-8 py-4 border border-ova-black font-medium hover:bg-ova-black hover:text-white transition-colors">
                    Our Story
                </button>
            </div>
        </div>
    </section>

    <!-- Features -->
    <section class="py-20 bg-ova-beige/30">
        <div class="max-w-6xl mx-auto px-6">
            <h2 class="text-3xl md:text-4xl font-bold text-center mb-16 text-ova-black">Why OVA</h2>
            <div class="grid md:grid-cols-3 gap-8">
                <div class="text-center p-6">
                    <div class="w-16 h-16 bg-ova-amber/20 rounded-full flex items-center justify-center mx-auto mb-4">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#E8A33B" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M12 6v6l4 2"></path>
                        </svg>
                    </div>
                    <h3 class="font-bold text-xl mb-2">Timeless Design</h3>
                    <p class="text-gray-600">Created to last beyond trends</p>
                </div>
                <div class="text-center p-6">
                    <div class="w-16 h-16 bg-ova-amber/20 rounded-full flex items-center justify-center mx-auto mb-4">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#E8A33B" stroke-width="2">
                            <path d="M12 3v18M3 12h18"></path>
                        </svg>
                    </div>
                    <h3 class="font-bold text-xl mb-2">Natural Materials</h3>
                    <p class="text-gray-600">Wood, stone, ceramic & aluminum</p>
                </div>
                <div class="text-center p-6">
                    <div class="w-16 h-16 bg-ova-amber/20 rounded-full flex items-center justify-center mx-auto mb-4">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#E8A33B" stroke-width="2">
                            <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"></path>
                            <path d="M12 6v6l4 2"></path>
                        </svg>
                    </div>
                    <h3 class="font-bold text-xl mb-2">Warm Light</h3>
                    <p class="text-gray-600">2200K-3000K for ultimate calm</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="py-12 bg-ova-black text-white text-center">
        <p class="text-ova-gray">© 2026 OVA Lighting. Designed for Calm.</p>
    </footer>

</body>
</html>
